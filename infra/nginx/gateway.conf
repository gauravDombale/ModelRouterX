server {
    listen 80;
    server_name _;

    location /v1/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://gateway:8000;
    }

    location / {
        proxy_pass http://dashboard:3000;
    }
}

